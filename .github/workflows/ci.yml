name: Enterprise Test Automation CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        default: staging
        options: [dev, staging, prod]
      suite:
        description: Test suite
        type: choice
        default: regression
        options: [smoke, regression]

env:
  ENV: ${{ github.event.inputs.environment || 'staging' }}
  HEADLESS: "true"
  BROWSER: chromium

jobs:
  smoke:
    if: github.event_name == 'pull_request' || github.event.inputs.suite == 'smoke'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - run: pytest --env=${{ env.ENV }} -m smoke --alluredir=allure-results

  regression:
    if: github.event_name != 'pull_request' && (github.event.inputs.suite == 'regression' || github.event.inputs.suite == null)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium
      - run: pytest --env=${{ env.ENV }} -m regression -n auto --dist loadscope --alluredir=allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore
